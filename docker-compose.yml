services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend-ml
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./app/backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend-ml
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: ml-network
